# Applitools ImageTester configuration
# The script reads these values at runtime.
#
# apiKey is mandatory.
# serverUrl is optional. Leave blank to use the Applitools default server.
# proxy is optional. Format: http://proxy or http://proxy,user,pass
# targetPath is passed at runtime using -f <path-to-pdf-folder-or-file>.
#
# ImageTester execution options:
# appName: application name shown in Applitools
# matchLevel: optional. Strict | IgnoreColors | Layout | Exact | None
# Leave blank to use the ImageTester default (Strict).
# ignoreDisplacements: true | false
# accessibility: AA:WCAG_2_0 | AAA:WCAG_2_0 | AA:WCAG_2_1 | AAA:WCAG_2_1
# The runner converts this into the argument pair expected by ImageTester 3.9.1.
# ignoreRegions/contentRegions/layoutRegions:
#   x,y,width,height|x,y,width,height

apiKey=
serverUrl=
proxy=
appName=
matchLevel=
ignoreDisplacements=true
accessibility=
ignoreRegions=
contentRegions=
layoutRegions=
